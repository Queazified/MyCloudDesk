name: Feature request
description: Suggest an improvement for MyCloudDesk
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user need are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the improvement you would like to see.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
